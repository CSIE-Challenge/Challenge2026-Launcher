name: Release Build

# Cross-exports the launcher for all three platforms from one Linux runner
# and uploads the binaries to the release:
#   <tag>_Challenge2026_Launcher_linux.x86_64
#   <tag>_Challenge2026_Launcher_windows.exe
#   <tag>_Challenge2026_Launcher_macos.zip

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  LAUNCHER_NAME: Challenge2026_Launcher

jobs:
  export:
    name: export (linux, windows, macos)
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSLO "$base/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          curl -fsSLO "$base/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d /tmp/godot-templates
          mv /tmp/godot-templates/templates \
             "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          godot --version

      - name: Import project
        run: godot --headless --import

      - name: Export launcher builds
        run: |
          TAG="${GITHUB_REF_NAME//\//-}"
          mkdir -p export
          godot --headless --export-release "Linux" \
            "export/${TAG}_${LAUNCHER_NAME}_linux.x86_64"
          godot --headless --export-release "Windows Desktop" \
            "export/${TAG}_${LAUNCHER_NAME}_windows.exe"
          godot --headless --export-release "macOS" "export/${LAUNCHER_NAME}.zip"
          mv "export/${LAUNCHER_NAME}.zip" "export/${TAG}_${LAUNCHER_NAME}_macos.zip"
          ls -lh export

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-builds
          path: export/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [export]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" \
                 --notes "Auto-built launcher release. Download the file for your OS — see the README for setup instructions."
          gh release upload "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" --clobber
